<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skills — lammer.app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/skills/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="/" class="site-logo">lammer<span class="logo-dot">.</span>app</a>
      <span class="header-sep">/</span>
      <span class="header-breadcrumb-link" style="color: var(--text-sec)">skills</span>
    </div>
    <nav class="header-nav">
    </nav>
  </div>
</header>

<div class="page-wrap">

  <div class="dir-hero">
    <h1 class="dir-title">skills</h1>
    <p class="dir-subtitle">Research and automation tools for investigative work. Open-source Python — no external dependencies.</p>

    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        class="search-input"
        id="search"
        type="text"
        placeholder="Find skills..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
  </div>

  <div class="skills-list" id="skills-list">

    <a class="skill-card" href="/skills/pipeline" data-name="investigative-pipeline" data-desc="build a queryable facts database from research documents books and media for use with claude code">
      <div class="card-left">
        <div class="card-name">investigative-pipeline</div>
        <div class="card-desc">Build a queryable facts database from research documents, books, and media — for use with Claude Code</div>
      </div>
      <div class="card-meta">
        <span class="card-lang">Python</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

  </div>

  <p class="no-results" id="no-results">No skills match "<span id="no-results-term"></span>"</p>

</div>

<script>
  const search = document.getElementById('search');
  const cards = document.querySelectorAll('.skill-card');
  const noResults = document.getElementById('no-results');
  const noResultsTerm = document.getElementById('no-results-term');

  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    let visible = 0;
    cards.forEach(card => {
      const name = card.dataset.name.toLowerCase();
      const desc = card.dataset.desc.toLowerCase();
      const match = !q || name.includes(q) || desc.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    noResultsTerm.textContent = search.value.trim();
    noResults.style.display = visible === 0 && q ? 'block' : 'none';
  });
</script>

</body>
</html>
